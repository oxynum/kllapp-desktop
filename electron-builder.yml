appId: fr.oxynum.kllapp
productName: kllapp
copyright: Copyright (c) 2026 Oxynum

asar: true
asarUnpack:
  - "**/*.node"
  - "**/*.dll"
  - "**/node_modules/@electric-sql/pglite/**"
  - "**/kllapp/.next/standalone/**"

directories:
  output: release
  buildResources: resources

files:
  - dist-electron/
  - kllapp/.next/standalone/
  - kllapp/.next/static/
  - kllapp/public/
  - node_modules/
  - package.json

mac:
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]
  category: public.app-category.business
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Office
  icon: resources/icons

publish:
  provider: github
  owner: oxynum
  repo: kllapp-desktop
